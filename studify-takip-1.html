<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Studify — Deneme Takip</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400..800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root{
    --bg:#FAFAFA;--surface:#FFFFFF;--border:#E5E7EB;--border-soft:#F0F0F2;
    --accent:#6366F1;--accent-soft:#EEF0FF;--accent-deep:#4F46E5;
    --success:#10B981;--success-soft:#E7F7F0;--danger:#EF4444;--danger-soft:#FDECEC;
    --warning:#F59E0B;--warning-soft:#FEF4E2;
    --ink:#1F2937;--muted:#6B7280;--faint:#9CA3AF;
    --display:"Bricolage Grotesque",ui-sans-serif,system-ui,sans-serif;
    --body:"Plus Jakarta Sans",ui-sans-serif,system-ui,sans-serif;
    --shadow:0 1px 2px rgba(16,24,40,.04),0 1px 3px rgba(16,24,40,.06);
    --shadow-md:0 8px 24px -8px rgba(16,24,40,.12);--sidebar:240px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{font-family:var(--body);background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased;line-height:1.5}
  ::selection{background:var(--accent);color:#fff}
  h1,h2,h3,h4{font-family:var(--display);font-weight:700;letter-spacing:-.02em;line-height:1.15}
  button{font-family:var(--body);cursor:pointer;border:none;background:none}
  input,select,textarea{font-family:var(--body)}
  a{color:inherit;text-decoration:none}
  .hidden{display:none!important}

  /* AUTH */
  #auth{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;
    background:radial-gradient(1200px 600px at 110% -10%,#EEF0FF 0,rgba(238,240,255,0) 55%),
      radial-gradient(900px 500px at -10% 110%,#E7F7F0 0,rgba(231,247,240,0) 50%),var(--bg)}
  .auth-card{width:100%;max-width:400px;background:var(--surface);border:1px solid var(--border);
    border-radius:18px;padding:34px 30px;box-shadow:var(--shadow-md);animation:rise .6s cubic-bezier(.2,.7,.2,1) both}
  .brand{font-family:var(--display);font-weight:800;font-size:30px;letter-spacing:-.04em;color:var(--accent)}
  .brand .dot{color:var(--ink)}
  .auth-sub{color:var(--muted);font-size:14px;margin-top:4px}
  .tabs{display:flex;gap:8px;background:var(--bg);border:1px solid var(--border);border-radius:11px;padding:5px;margin:22px 0 18px}
  .tabs button{flex:1;padding:9px;border-radius:7px;font-size:14px;font-weight:600;color:var(--muted);transition:.18s}
  .tabs button.on{background:var(--surface);color:var(--accent);box-shadow:var(--shadow)}
  .field{margin-bottom:13px}
  .field label{display:block;font-size:12.5px;font-weight:600;color:var(--muted);margin-bottom:6px}
  .field input,.field select,.field textarea{width:100%;padding:11px 13px;border:1px solid var(--border);
    border-radius:9px;font-size:14px;background:var(--surface);transition:.16s;color:var(--ink)}
  .field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;width:100%;background:var(--accent);
    color:#fff;padding:12px;border-radius:9px;font-weight:600;font-size:14.5px;transition:.16s}
  .btn:hover{background:var(--accent-deep);transform:translateY(-1px)}
  .btn.ghost{background:transparent;color:var(--muted);border:1px solid var(--border)}
  .btn.ghost:hover{background:var(--bg);color:var(--ink);transform:none}
  .btn.sm{width:auto;padding:9px 16px;font-size:13.5px}
  .err{color:var(--danger);font-size:12.5px;margin-top:-4px;margin-bottom:8px;min-height:16px}
  .auth-hint{margin-top:14px;font-size:11.5px;color:var(--faint);text-align:center;line-height:1.6}

  /* SHELL */
  #app{display:none;min-height:100vh}
  .layout{display:flex;min-height:100vh}
  .sidebar{width:var(--sidebar);flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);
    padding:20px 14px;display:flex;flex-direction:column;position:fixed;inset:0 auto 0 0;z-index:40;
    transition:transform .26s cubic-bezier(.2,.7,.2,1)}
  .side-brand{font-family:var(--display);font-weight:800;font-size:22px;letter-spacing:-.04em;color:var(--accent);padding:6px 10px 18px}
  .side-brand .dot{color:var(--ink)}
  .nav{display:flex;flex-direction:column;gap:2px;flex:1}
  .nav a{display:flex;align-items:center;gap:11px;padding:10px 11px;border-radius:9px;font-size:14px;font-weight:500;color:var(--muted);transition:.14s;cursor:pointer}
  .nav a svg{width:18px;height:18px;flex-shrink:0}
  .nav a:hover{background:var(--bg);color:var(--ink)}
  .nav a.active{background:var(--accent-soft);color:var(--accent-deep);font-weight:600}
  .side-foot{border-top:1px solid var(--border);padding-top:12px;margin-top:8px}
  .user-chip{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:9px}
  .main{flex:1;margin-left:var(--sidebar);min-width:0;display:flex;flex-direction:column}
  .topbar{height:62px;border-bottom:1px solid var(--border);background:rgba(255,255,255,.8);backdrop-filter:blur(8px);
    position:sticky;top:0;z-index:30;display:flex;align-items:center;justify-content:space-between;padding:0 22px;gap:12px}
  .topbar .page-title{font-family:var(--display);font-weight:700;font-size:18px}
  .hamburger{display:none;width:38px;height:38px;border-radius:9px;align-items:center;justify-content:center;color:var(--ink)}
  .hamburger:hover{background:var(--bg)}
  .content{padding:26px 22px 70px;max-width:1080px;width:100%;margin:0 auto}
  .scrim{display:none;position:fixed;inset:0;background:rgba(17,24,39,.45);z-index:35}

  .avatar{display:inline-flex;align-items:center;justify-content:center;border-radius:50%;background:var(--accent-soft);color:var(--accent-deep);font-weight:700;flex-shrink:0}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:12px;box-shadow:var(--shadow)}
  .grid{display:grid;gap:14px}
  .badge{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:7px;font-size:11.5px;font-weight:600}
  .b-accent{background:var(--accent-soft);color:var(--accent-deep)}
  .b-success{background:var(--success-soft);color:#0b815a}
  .b-danger{background:var(--danger-soft);color:#c0392b}
  .b-warning{background:var(--warning-soft);color:#b26a00}
  .b-gray{background:#F3F4F6;color:var(--muted)}
  .muted{color:var(--muted)}.faint{color:var(--faint)}
  .section-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;gap:10px;flex-wrap:wrap}
  .section-h h2{font-size:16px}
  .view{animation:fade .35s ease both}
  .stat{padding:17px}
  .stat .k{font-size:12px;font-weight:600;color:var(--muted);display:flex;align-items:center;gap:7px}
  .stat .v{font-family:var(--display);font-weight:700;font-size:28px;letter-spacing:-.03em;margin-top:8px}
  .stat .d{font-size:12px;margin-top:3px}
  .ic-wrap{width:30px;height:30px;border-radius:8px;display:inline-flex;align-items:center;justify-content:center}
  .pill-btn{padding:7px 13px;border-radius:8px;font-size:13px;font-weight:600;border:1px solid var(--border);color:var(--muted);background:var(--surface);transition:.14s}
  .pill-btn:hover{background:var(--bg);color:var(--ink)}
  .pill-btn.on{background:var(--accent);color:#fff;border-color:var(--accent)}
  .delta-up{color:var(--success);font-weight:700}
  .delta-down{color:var(--danger);font-weight:700}

  /* wizard */
  .wiz-prog{height:6px;background:var(--bg);border-radius:6px;overflow:hidden;margin-bottom:16px}
  .wiz-prog>div{height:100%;background:var(--accent);transition:width .3s;border-radius:6px}
  .wiz-opt{display:block;width:100%;text-align:left;padding:13px 15px;border:1.5px solid var(--border);border-radius:11px;font-size:14px;font-weight:500;margin-bottom:9px;transition:.14s;background:var(--surface);color:var(--ink)}
  .wiz-opt:hover{border-color:var(--accent);background:var(--accent-soft)}
  .wiz-opt.on{border-color:var(--accent);background:var(--accent-soft);color:var(--accent-deep);font-weight:600}
  .chips{display:flex;flex-wrap:wrap;gap:6px}
  .chip{display:inline-flex;align-items:center;padding:6px 11px;border:1.5px solid var(--border);border-radius:20px;font-size:12.5px;font-weight:500;background:var(--surface);color:var(--ink);transition:.13s;cursor:pointer}
  .chip:hover{border-color:var(--accent)}
  .chip.on{background:var(--accent);color:#fff;border-color:var(--accent)}

  .chart-card{padding:18px}
  .chart-card h3{font-size:14.5px;margin-bottom:2px}
  .chart-card .sub{font-size:12px;color:var(--faint);margin-bottom:14px}
  .chart-box{position:relative;height:260px}
  .chart-box.tall{height:300px}

  /* schedule */
  .sched-wrap{overflow-x:auto;border:1px solid var(--border);border-radius:12px;background:var(--surface)}
  table.sched{border-collapse:collapse;width:100%;min-width:680px}
  table.sched th,table.sched td{border-bottom:1px solid var(--border-soft);border-right:1px solid var(--border-soft);padding:0;text-align:center;vertical-align:top}
  table.sched thead th{background:var(--bg);padding:10px 6px;font-size:12.5px;font-weight:600;color:var(--muted)}
  .timecol{width:58px;font-size:11px;color:var(--faint);padding:6px!important;font-weight:600;background:#fcfcfd}
  .slot{height:42px;position:relative;cursor:pointer;transition:.1s}
  .slot:hover{background:var(--accent-soft)}
  .lesson{position:absolute;inset:3px;border-radius:7px;display:flex;flex-direction:column;justify-content:center;padding:3px 7px;color:#fff;font-size:11px;font-weight:600;text-align:left;line-height:1.15;overflow:hidden;cursor:pointer}
  .lesson small{font-weight:500;opacity:.85;font-size:9.5px}
  .lesson .del{position:absolute;top:0;right:4px;font-size:14px;line-height:1;font-weight:700;opacity:.75}
  .lesson.done{opacity:.5}

  /* chat */
  .chat{display:flex;flex-direction:column;height:min(560px,68vh);border:1px solid var(--border);border-radius:12px;overflow:hidden;background:var(--surface)}
  .chat-head{padding:13px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;font-weight:600;font-size:14px}
  .chat-body{flex:1;overflow-y:auto;padding:18px;display:flex;flex-direction:column;gap:9px;background:#fcfcfd}
  .bubble{max-width:78%;padding:9px 13px;border-radius:14px;font-size:13.5px;line-height:1.4}
  .bubble.me{align-self:flex-end;background:var(--accent);color:#fff;border-bottom-right-radius:4px}
  .bubble.you{align-self:flex-start;background:var(--surface);border:1px solid var(--border);border-bottom-left-radius:4px}
  .bubble .t{display:block;font-size:10px;opacity:.6;margin-top:3px}
  .chat-input{display:flex;gap:8px;padding:12px;border-top:1px solid var(--border)}
  .chat-input input{flex:1;padding:11px 14px;border:1px solid var(--border);border-radius:22px;font-size:14px}
  .chat-input input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
  .send{width:42px;height:42px;border-radius:50%;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;flex-shrink:0}

  /* deneme list */
  .drow{display:flex;align-items:center;gap:12px;padding:13px 15px;border:1px solid var(--border);border-radius:11px;background:var(--surface)}
  .drow .net{font-family:var(--display);font-weight:700;font-size:20px;min-width:64px}
  table.subj{width:100%;border-collapse:collapse;margin-top:6px}
  table.subj th,table.subj td{padding:7px 6px;font-size:12.5px;border-bottom:1px solid var(--border-soft);text-align:center}
  table.subj th{color:var(--muted);font-weight:600}
  table.subj td:first-child,table.subj th:first-child{text-align:left}

  /* modal */
  .modal-scrim{position:fixed;inset:0;background:rgba(17,24,39,.5);z-index:60;display:flex;align-items:center;justify-content:center;padding:18px;animation:fade .2s}
  .modal{background:var(--surface);border-radius:16px;max-width:480px;width:100%;padding:24px;box-shadow:var(--shadow-md);animation:rise .3s both;max-height:90vh;overflow-y:auto}
  .modal h3{font-size:18px;margin-bottom:14px}
  .toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;padding:11px 18px;border-radius:10px;font-size:13.5px;z-index:80;box-shadow:var(--shadow-md);animation:rise .3s}

  @keyframes rise{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
  @keyframes fade{from{opacity:0}to{opacity:1}}
  .stagger>*{animation:rise .5s both}
  .stagger>*:nth-child(1){animation-delay:.02s}.stagger>*:nth-child(2){animation-delay:.07s}
  .stagger>*:nth-child(3){animation-delay:.12s}.stagger>*:nth-child(4){animation-delay:.17s}

  @media(max-width:860px){
    .sidebar{transform:translateX(-100%)}.sidebar.open{transform:none}
    .main{margin-left:0}.hamburger{display:flex}.scrim.show{display:block}
  }
</style>
</head>
<body>

<!-- AUTH -->
<div id="auth">
  <div class="auth-card">
    <div class="brand">Studify<span class="dot">.</span></div>
    <p class="auth-sub">Çalışma takibi &amp; deneme analizi</p>
    <div class="tabs" id="authTabs">
      <button data-t="login" class="on">Giriş Yap</button>
      <button data-t="register">Kayıt Ol</button>
    </div>

    <div id="regName" class="field hidden">
      <label>Ad Soyad</label><input id="aName" placeholder="Adın Soyadın" />
    </div>
    <div class="field"><label>E-posta</label><input id="aEmail" type="email" placeholder="ornek@studify.app" /></div>
    <div class="field"><label>Şifre</label><input id="aPass" type="password" placeholder="••••••••" /></div>
    <div class="err" id="authErr"></div>
    <button class="btn" id="authBtn" onclick="submitAuth()">Giriş Yap</button>
    <p class="auth-hint">Veriler yalnızca bu cihazdaki tarayıcında saklanır (yerel). Sunucu/şifre güvenliği yoktur — kişisel takip aracı.</p>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="layout">
    <aside class="sidebar" id="sidebar">
      <div class="side-brand">Studify<span class="dot">.</span></div>
      <nav class="nav" id="nav"></nav>
      <div class="side-foot">
        <div class="user-chip">
          <span class="avatar" id="sideAv" style="width:36px;height:36px;font-size:14px"></span>
          <div style="min-width:0"><div id="sideName" style="font-size:13.5px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis"></div>
          <div class="faint" style="font-size:11.5px">Öğrenci</div></div>
        </div>
        <a class="nav" style="display:flex;gap:11px;padding:10px 11px;border-radius:9px;font-size:14px;color:var(--muted);cursor:pointer;margin-top:4px" onclick="logout()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" width="18" height="18" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9"/></svg>Çıkış Yap</a>
      </div>
    </aside>
    <div class="scrim" id="scrim" onclick="toggleSide(false)"></div>
    <div class="main">
      <header class="topbar">
        <div style="display:flex;align-items:center;gap:10px">
          <button class="hamburger" onclick="toggleSide(true)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" width="22" height="22" stroke-width="2"><path d="M3 12h18M3 6h18M3 18h18"/></svg></button>
          <span class="page-title" id="pageTitle">Panel</span>
        </div>
      </header>
      <main class="content" id="content"></main>
    </div>
  </div>
</div>

<div id="modalRoot"></div>

<script>
/* ============================================================
   Studify — tek dosya, API yok. Veri localStorage'da.
   ============================================================ */
const COLORS=["#6366F1","#10B981","#F59E0B","#EF4444","#0EA5E9","#8B5CF6"];
const DAYS=["Pzt","Sal","Çar","Per","Cum","Cmt","Paz"];
const DAYS_FULL=["Pazartesi","Salı","Çarşamba","Perşembe","Cuma","Cumartesi","Pazar"];
const EXAM={
  TYT:[["Türkçe",40],["Sosyal",20],["Matematik",40],["Fen",20]],
  AYT:[["Matematik",40],["Fizik",14],["Kimya",13],["Biyoloji",13]]
};
const STORE_KEY="studify.track.v1";

/* ---------- storage (güvenli) ---------- */
let mem=null;
function loadDB(){
  try{const r=localStorage.getItem(STORE_KEY);return r?JSON.parse(r):{users:[],session:null};}
  catch(e){return mem||(mem={users:[],session:null});}
}
function saveDB(db){
  try{localStorage.setItem(STORE_KEY,JSON.stringify(db));}catch(e){mem=db;}
}
let DB=loadDB();
function me(){return DB.users.find(u=>u.id===DB.session)||null;}
function persist(){saveDB(DB);}

/* ---------- helpers ---------- */
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6);}
function initials(n){return (n||"?").trim().split(" ").slice(0,2).map(w=>w[0]).join("").toUpperCase();}
function esc(s){return (s||"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));}
function todayStr(){return new Date().toISOString().slice(0,10);}
function net(d,y){return Math.max(0, d-(y/4));}
function fmtDate(s){const [y,m,d]=s.split("-");return d+"."+m+"."+y.slice(2);}
function daysAgo(s){const diff=Math.round((Date.now()-new Date(s+"T00:00").getTime())/86400000);return diff;}
function toast(msg){const t=document.createElement("div");t.className="toast";t.textContent=msg;document.body.appendChild(t);setTimeout(()=>t.remove(),2200);}

/* ---------- ICONS ---------- */
function icon(n){const p={
  koc:'<path d="M12 3l1.7 4.3L18 9l-4.3 1.7L12 15l-1.7-4.3L6 9l4.3-1.7z"/><circle cx="18.5" cy="5.5" r="1.3"/>',
  home:'<path d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1h-5v-6H9v6H4a1 1 0 01-1-1z"/>',
  chart:'<path d="M3 3v18h18"/><rect x="7" y="11" width="3" height="6"/><rect x="12" y="7" width="3" height="10"/><rect x="17" y="13" width="3" height="4"/>',
  calendar:'<rect x="3" y="4" width="18" height="17" rx="2"/><path d="M3 9h18M8 2v4M16 2v4"/>',
  chat:'<path d="M21 11.5a8.38 8.38 0 01-8.5 8.5 8.5 8.5 0 01-3.8-.9L3 21l1.9-5.7A8.5 8.5 0 1121 11.5z"/>',
}[n];return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">'+p+'</svg>';}
function mini(n){const p={fire:'<path d="M12 2s4 4 4 8a4 4 0 11-8 0c0-1 .5-2 1-3 .5 2 2 2 2 2s-1-3 1-7z"/>',
  up:'<path d="M3 17l6-6 4 4 8-8"/><path d="M21 7v6h-6"/>',clock:'<circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/>',
  doc:'<path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><path d="M14 2v6h6"/>',
  star:'<path d="M12 2l3 6.5 7 .9-5 4.8 1.3 7L12 18l-6.6 3.2L6.7 14l-5-4.8 7-.9z"/>',
  sum:'<path d="M5 4h14L9 12l10 8H5"/>'}[n];
  return '<svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">'+p+'</svg>';}

/* ============================================================
   AUTH
   ============================================================ */
let authMode="login";
document.querySelectorAll("#authTabs button").forEach(b=>b.onclick=()=>{
  authMode=b.dataset.t;
  document.querySelectorAll("#authTabs button").forEach(x=>x.classList.toggle("on",x===b));
  document.getElementById("regName").classList.toggle("hidden",authMode!=="register");
  document.getElementById("authBtn").textContent=authMode==="login"?"Giriş Yap":"Kayıt Ol";
  document.getElementById("authErr").textContent="";
});
function submitAuth(){
  const email=document.getElementById("aEmail").value.trim().toLowerCase();
  const pass=document.getElementById("aPass").value;
  const err=document.getElementById("authErr");
  if(!email||!pass){err.textContent="E-posta ve şifre gerekli.";return;}
  if(authMode==="register"){
    const name=document.getElementById("aName").value.trim();
    if(!name){err.textContent="Ad soyad gerekli.";return;}
    if(DB.users.some(u=>u.email===email)){err.textContent="Bu e-posta zaten kayıtlı.";return;}
    const u={id:uid(),name,email,pass,schedule:[],denemeler:[],messages:[],studyLog:[]};
    DB.users.push(u);DB.session=u.id;persist();enterApp();
  }else{
    const u=DB.users.find(x=>x.email===email&&x.pass===pass);
    if(!u){err.textContent="E-posta veya şifre hatalı.";return;}
    DB.session=u.id;persist();enterApp();
  }
}

/* ---------- SVG grafikler (dış bağımlılık YOK) ---------- */
function svgEmpty(msg){return `<div class="muted" style="padding:34px 10px;text-align:center;font-size:13px">${msg||"Veri yok"}</div>`;}
function smoothPath(pts){
  if(pts.length<2) return pts.length?`M ${pts[0][0].toFixed(1)} ${pts[0][1].toFixed(1)}`:"";
  let d=`M ${pts[0][0].toFixed(1)} ${pts[0][1].toFixed(1)}`;
  for(let i=0;i<pts.length-1;i++){
    const p0=pts[i-1]||pts[i],p1=pts[i],p2=pts[i+1],p3=pts[i+2]||pts[i+1];
    const c1x=p1[0]+(p2[0]-p0[0])/6,c1y=p1[1]+(p2[1]-p0[1])/6;
    const c2x=p2[0]-(p3[0]-p1[0])/6,c2y=p2[1]-(p3[1]-p1[1])/6;
    d+=` C ${c1x.toFixed(1)} ${c1y.toFixed(1)}, ${c2x.toFixed(1)} ${c2y.toFixed(1)}, ${p2[0].toFixed(1)} ${p2[1].toFixed(1)}`;
  }
  return d;
}
function svgLine(vals,labels,color){
  if(!vals||!vals.length) return svgEmpty("Grafik için veri ekle");
  color=color||"#6366F1";
  const W=340,H=180,pl=6,pr=6,pt=26,pb=22;
  let max=Math.max(...vals),min=Math.min(...vals);
  if(max===min){max+=1;min=Math.max(0,min-1);}
  const pad=(max-min)*0.18;max+=pad;min=Math.max(0,min-pad);
  const span=(max-min)||1;
  const X=i=>pl+(vals.length<=1?(W-pl-pr)/2:(i/(vals.length-1))*(W-pl-pr));
  const Y=v=>pt+(1-(v-min)/span)*(H-pt-pb);
  const pts=vals.map((v,i)=>[X(i),Y(v)]);
  const line=smoothPath(pts);
  const area=line+` L ${pts[pts.length-1][0].toFixed(1)} ${(H-pb).toFixed(1)} L ${pts[0][0].toFixed(1)} ${(H-pb).toFixed(1)} Z`;
  const gid="g"+Math.random().toString(36).slice(2,7);
  const lp=pts[pts.length-1],lv=+vals[vals.length-1];
  const txt=lv.toFixed(1),bw=txt.length*7+22;
  let bx=lp[0]-bw/2;bx=Math.max(2,Math.min(W-bw-2,bx));const by=Math.max(2,lp[1]-32);
  const badge=`<g><rect x="${bx.toFixed(1)}" y="${by.toFixed(1)}" width="${bw}" height="22" rx="11" fill="#fff" stroke="#ECECF1"/><text x="${(bx+bw/2).toFixed(1)}" y="${(by+15).toFixed(1)}" text-anchor="middle" font-size="11" font-weight="700" fill="${color}">${txt}</text></g>`;
  let xlab="";const idxs=vals.length<=1?[0]:[...new Set([0,Math.floor((vals.length-1)/2),vals.length-1])];
  idxs.forEach(i=>{xlab+=`<text x="${X(i).toFixed(1)}" y="${H-5}" text-anchor="${i===0?'start':i===vals.length-1?'end':'middle'}" font-size="9" fill="#9CA3AF">${labels&&labels[i]||""}</text>`;});
  return `<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto;display:block" font-family="'Plus Jakarta Sans',sans-serif">
    <defs><linearGradient id="${gid}" x1="0" x2="0" y1="0" y2="1"><stop offset="0" stop-color="${color}" stop-opacity="0.30"/><stop offset="1" stop-color="${color}" stop-opacity="0"/></linearGradient></defs>
    <path d="${area}" fill="url(#${gid})"/>
    <path d="${line}" fill="none" stroke="${color}" stroke-width="3" stroke-linejoin="round" stroke-linecap="round"/>
    <circle cx="${lp[0].toFixed(1)}" cy="${lp[1].toFixed(1)}" r="7" fill="${color}" opacity="0.18"/>
    <circle cx="${lp[0].toFixed(1)}" cy="${lp[1].toFixed(1)}" r="4" fill="#fff" stroke="${color}" stroke-width="2.5"/>
    ${badge}${xlab}</svg>`;
}
function svgHBars(vals,labels,opts){
  opts=opts||{};
  if(!vals||!vals.length) return svgEmpty();
  const n=vals.length,rowH=27,W=340,pl=88,pr=34,H=n*rowH+8;
  const maxAbs=Math.max(...vals.map(v=>Math.abs(v)),1);
  const barMax=W-pl-pr,signed=opts.signed,center=pl+barMax/2;
  let out="";
  if(signed) out+=`<line x1="${center}" y1="4" x2="${center}" y2="${H-4}" stroke="#E5E7EB" stroke-width="1"/>`;
  vals.forEach((v,i)=>{
    const cy=6+i*rowH;let x0,w,color;
    if(signed){w=Math.abs(v)/maxAbs*(barMax/2);x0=v>=0?center:center-w;color=v>=0?"#10B981":"#EF4444";}
    else{w=Math.max(2,v/maxAbs*barMax);x0=pl;color=(opts.colors&&opts.colors[i])||"#6366F1";}
    out+=`<rect x="${x0.toFixed(1)}" y="${cy}" width="${Math.max(1,w).toFixed(1)}" height="16" rx="3" fill="${color}"/>`;
    out+=`<text x="${pl-6}" y="${cy+12}" text-anchor="end" font-size="9.5" fill="#6B7280">${(labels&&labels[i]||"").slice(0,12)}</text>`;
    const tx=signed?(v>=0?x0+w+3:x0-w-3):x0+w+4;
    out+=`<text x="${tx.toFixed(1)}" y="${cy+12}" text-anchor="${signed&&v<0?'end':'start'}" font-size="9.5" fill="#9CA3AF" font-weight="600">${(signed&&v>=0?'+':'')+(+v).toFixed(1)}</text>`;
  });
  return `<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto;display:block" font-family="'Plus Jakarta Sans',sans-serif">${out}</svg>`;
}

/* ---------- ÇALIŞMA TAKİBİ ---------- */
function slog(){const u=me();if(!u.studyLog)u.studyLog=[];return u.studyLog;}
function studyKey(s){return s.day+"|"+s.time;}
function isStudiedToday(s){const t=todayStr(),k=studyKey(s);return slog().some(e=>e.date===t&&e.key===k);}
function toggleStudied(i){const s=me().schedule[i];if(!s)return;const t=todayStr(),k=studyKey(s);const log=slog();
  const idx=log.findIndex(e=>e.date===t&&e.key===k);
  if(idx>=0){log.splice(idx,1);toast("İşaret kaldırıldı");}
  else{log.push({id:uid(),date:t,key:k,subj:s.subj,hours:s.dur||1});toast("Çalıştın olarak işaretlendi ✓");}
  persist();go(current);}
function studyByDay(n){const map={};slog().forEach(e=>{map[e.date]=(map[e.date]||0)+e.hours;});
  const out=[];for(let i=n-1;i>=0;i--){const d=new Date(Date.now()-i*86400000),ds=d.toISOString().slice(0,10);
    out.push({label:(""+d.getDate()).padStart(2,"0")+"."+(""+(d.getMonth()+1)).padStart(2,"0"),h:+(map[ds]||0).toFixed(1)});}
  return out;}

  for(let i=29;i>=0;i-=3){

    const type=Math.random()>.4?"TYT":"AYT";
    base+=(Math.random()*8-3); // dalgalı artış
    const target=Math.max(20,Math.min(115,base));
    const rows=EXAM[type].map(r=>{const share=target*(r[1]/120);const d=Math.min(r[1],Math.round(share+Math.random()*3));const y=Math.min(r[1]-d,Math.round(Math.random()*4));return {subj:r[0],d,y};});

  }
  persist();toast("Örnek veri yüklendi");go("analiz");

function takvimView(){
  const times=[];for(let h=8;h<=23;h++)times.push((""+h).padStart(2,"0")+":00");
  const map={};me().schedule.forEach((s,i)=>{map[s.day+"_"+s.time]={...s,_i:i};});
  const skip={};
  const rows=times.map(t=>{
    const cells=DAYS.map((d,di)=>{
      if(skip[di+"_"+t])return"";
      const s=map[di+"_"+t];
      if(s){for(let k=1;k<(s.dur||1);k++){const hh=(""+(parseInt(t)+k)).padStart(2,"0")+":00";skip[di+"_"+hh]=1;}
        return `<td class="slot" rowspan="${s.dur||1}"><div class="lesson ${isStudiedToday(s)?'done':''}" style="background:${COLORS[s.color]}" onclick="toggleStudied(${s._i})" title="Çalıştıysan dokun"><b class="del" onclick="event.stopPropagation();delSlot(${s._i})">×</b>${isStudiedToday(s)?'✓ ':''}${esc(s.subj)}<small>${s.dur||1} sa</small></div></td>`;}
      return `<td class="slot" onclick="addSlot(${di},'${t}')"></td>`;
    });
    return `<tr><td class="timecol">${t}</td>${cells.join("")}</tr>`;
  }).join("");
  return `<div class="view">
    <div class="section-h"><h1 style="font-size:22px">Programım</h1>
      <button class="pill-btn on" onclick="openWizard()">✨ AI ile Program Oluştur</button></div>
    <p class="muted" style="margin-bottom:12px;font-size:13.5px">15 soruluk testle sana özel program oluştur, ya da boş hücreye dokunup kendin ekle (bloğa dokun = çalıştım, × = sil).${me().schedule.length?"":' <button class="pill-btn" onclick="sampleWeek()">Örnek hafta</button>'}</p>
    <div class="sched-wrap"><table class="sched">
      <thead><tr><th class="timecol">Saat</th>${DAYS_FULL.map(d=>`<th>${d}</th>`).join("")}</tr></thead>
      <tbody>${rows}</tbody></table></div>
  </div>`;
}

const WIZ=[
  {id:"exam",q:"Hedefin hangi sınav?",opts:["TYT ağırlıklı","AYT - Sayısal","AYT - Eşit Ağırlık","Karma / Hepsi"]},

  {id:"current",q:"Şu an haftada kaç gün düzenli çalışıyorsun?",opts:["0-1 gün","2-3 gün","4-5 gün","6-7 gün"]},
  {id:"days",q:"Haftada kaç gün çalışmak istersin?",opts:["4 gün","5 gün","6 gün","7 gün"]},
  {id:"wkday",q:"Hafta içi günde kaç saat ayırabilirsin?",opts:["1-2 saat","2-3 saat","3-4 saat","4+ saat"]},
  {id:"wkend",q:"Hafta sonu günde kaç saat ayırabilirsin?",opts:["2-3 saat","3-5 saat","5-7 saat","7+ saat"]},
  {id:"peak",q:"En verimli olduğun zaman dilimi?",opts:["Sabah","Öğleden sonra","Akşam","Gece"]},
  {id:"focus",q:"Tek oturuşta ne kadar odaklanabilirsin?",opts:["25-30 dk (Pomodoro)","45 dk","60 dk","90 dk+"]},
  {id:"weak",q:"En zayıf derslerin? (en fazla 2)",multi:true,max:2,opts:["Matematik","Fizik","Kimya","Biyoloji","Türkçe","Sosyal/Tarih"]},
  {id:"strong",q:"En güçlü dersin?",opts:["Matematik","Fizik","Kimya","Biyoloji","Türkçe","Sosyal/Tarih"]},
  {id:"style",q:"Çalışma tarzın daha çok hangisi?",opts:["Konu öğrenme","Soru çözme","Tekrar","Dengeli"]},
  {id:"deneme",q:"Haftada kaç deneme çözmek istersin?",opts:["0","1","2","3+"]},
  {id:"rest",q:"Okuldan sonra ne kadar dinlenmen gerekir?",opts:["Kısa (30 dk)","Orta (1 saat)","Uzun (2 saat+)"]},
  {id:"goal",q:"Bu dönem önceliğin ne?",opts:["Net artırmak","Konuları bitirmek","Eksik kapatmak","Düzen kurmak"]},
  {id:"ramp",q:"Çalışma yükün zamanla nasıl olsun?",opts:["Sabit kalsın","Yavaşça artsın","Hızlı artsın"]},
];
let wizStep=0, wizAns={};
function openWizard(){ wizStep=0; wizAns={}; renderWiz(); }
function renderWiz(){
  const q=WIZ[wizStep], sel=wizAns[q.id];
  const opts=q.opts.map((o,i)=>{
    const on=q.multi?((sel||[]).includes(o)):sel===o;
    return `<button class="wiz-opt ${on?'on':''}" onclick="wizPick(${i},${!!q.multi},${q.max||0})">${o}${q.multi&&on?' ✓':''}</button>`;
  }).join("");
  const pct=Math.round(((wizStep+1)/WIZ.length)*100);
  modal(`
    <div class="wiz-prog"><div style="width:${pct}%"></div></div>
    <div class="faint" style="font-size:12px;margin-bottom:6px">Soru ${wizStep+1} / ${WIZ.length}${q.multi?' · en fazla '+q.max:''}</div>
    <h3 style="margin-bottom:14px;font-size:17px">${q.q}</h3>
    ${opts}
    <div style="display:flex;gap:8px;margin-top:14px">
      ${wizStep>0?'<button class="btn ghost" onclick="wizBack()">Geri</button>':'<button class="btn ghost" onclick="closeModal()">Vazgeç</button>'}
      <button class="btn" onclick="wizNext()">${wizStep===WIZ.length-1?'Programı Oluştur ✨':'Devam'}</button>
    </div>`);
}
function wizPick(i,multi,max){
  const q=WIZ[wizStep], o=q.opts[i];
  if(multi){
    let arr=wizAns[q.id]||[];
    if(arr.includes(o)) arr=arr.filter(x=>x!==o);
    else { if(arr.length>=max){toast("En fazla "+max+" seçim");return;} arr=[...arr,o]; }
    wizAns[q.id]=arr;
  } else wizAns[q.id]=o;
  renderWiz();
}
function wizBack(){ if(wizStep>0){wizStep--;renderWiz();} }
function wizNext(){
  const q=WIZ[wizStep], a=wizAns[q.id];
  if(a===undefined||(q.multi&&(!a||!a.length))){toast("Bir seçim yap");return;}
  if(wizStep<WIZ.length-1){wizStep++;renderWiz();}
  else renderTopics();
}

function topicSubjKey(w){return w==="Sosyal/Tarih"?"Sosyal":w;}
function escq(s){return (s||"").replace(/'/g,"\\'");}
function renderTopics(){
  const weakRaw=wizAns.weak||[];
  if(!wizAns.topics) wizAns.topics={};
  if(!me().customTopics) me().customTopics={};
  const sections=weakRaw.map(wr=>{
    const key=topicSubjKey(wr), groups=TOPICS[key]||{}, sel=wizAns.topics[key]||[];
    const custom=me().customTopics[key]||[];
    const grp=(label,list,removable)=>{
      if(!list.length) return "";
      const chips=list.map(t=>{
        const on=sel.includes(t);
        const x=removable?` <b onclick="event.stopPropagation();removeCustomTopic('${escq(key)}','${escq(t)}')" style="opacity:.6;margin-left:3px">×</b>`:"";
        return `<span class="chip ${on?'on':''}" onclick="toggleTopic('${escq(key)}','${escq(t)}')">${t}${x}</span>`;
      }).join("");
      return `<div style="margin-bottom:9px"><div class="faint" style="font-size:11px;font-weight:600;margin-bottom:5px">${label}</div><div class="chips">${chips}</div></div>`;
    };
    const defGroups=Object.keys(groups).map(g=>grp(/^\d+$/.test(g)?g+". Sınıf":g, groups[g], false)).join("");
    const customGroup=grp("Senin eklediklerin", custom, true);
    const adder=`<div style="display:flex;gap:6px;margin-top:6px"><input id="ct_${key}" placeholder="Kendi konunu ekle..." style="flex:1;padding:8px 11px;border:1px solid var(--border);border-radius:8px;font-size:12.5px" onkeydown="if(event.key==='Enter')addCustomTopic('${escq(key)}')"><button class="pill-btn" onclick="addCustomTopic('${escq(key)}')">Ekle</button></div>`;
    return `<div style="margin-bottom:16px"><h4 style="font-size:14px;margin-bottom:8px;color:var(--accent-deep)">${key}</h4>${defGroups}${customGroup}${adder}</div>`;
  }).join("");
  const count=Object.values(wizAns.topics).reduce((a,arr)=>a+arr.length,0);
  modal(`
    <div class="wiz-prog"><div style="width:100%"></div></div>
    <div class="faint" style="font-size:12px;margin-bottom:6px">Son adım · konu seçimi</div>
    <h3 style="margin-bottom:4px;font-size:17px">Eksik / zayıf konuların</h3>
    <p class="muted" style="font-size:12px;margin-bottom:4px">Kötü olduğun konuları işaretle; programda bunlara öncelik verilir. (${count} seçili)</p>
    <p class="faint" style="font-size:11px;margin-bottom:12px">Aşağıdaki liste düzenlenebilir bir <b>taslaktır</b>; müfredat değiştiği için kendi konunu da ekleyebilirsin.</p>
    <div style="max-height:42vh;overflow-y:auto;margin:0 -4px 12px;padding:0 4px">${sections}</div>
    <div style="display:flex;gap:8px">
      <button class="btn ghost" onclick="wizStep=WIZ.length-1;renderWiz()">Geri</button>
      <button class="btn" onclick="generateProgram()">Programı Oluştur ✨</button>
    </div>`);
}
function toggleTopic(subj,topic){
  if(!wizAns.topics) wizAns.topics={};
  let arr=wizAns.topics[subj]||[];
  if(arr.includes(topic)) arr=arr.filter(x=>x!==topic); else arr=[...arr,topic];
  wizAns.topics[subj]=arr; renderTopics();
}
function addCustomTopic(key){
  const el=document.getElementById("ct_"+key); if(!el) return;
  const v=el.value.trim(); if(!v) return;
  if(!me().customTopics) me().customTopics={};
  const arr=me().customTopics[key]||[];
  if(!arr.includes(v)) arr.push(v);
  me().customTopics[key]=arr;
  if(!wizAns.topics) wizAns.topics={};
  const selArr=wizAns.topics[key]||[];
  if(!selArr.includes(v)) selArr.push(v);
  wizAns.topics[key]=selArr;
  persist(); renderTopics();
}
function removeCustomTopic(key,topic){
  if(me().customTopics&&me().customTopics[key]) me().customTopics[key]=me().customTopics[key].filter(x=>x!==topic);
  if(wizAns.topics&&wizAns.topics[key]) wizAns.topics[key]=wizAns.topics[key].filter(x=>x!==topic);
  persist(); renderTopics();
}

function generateProgram(){
  const a=wizAns;
  const POOLS={
    "TYT ağırlıklı":["Türkçe","Matematik","Fen","Sosyal"],
    "AYT - Sayısal":["Matematik","Fizik","Kimya","Biyoloji"],
    "AYT - Eşit Ağırlık":["Matematik","Türkçe","Tarih","Coğrafya"],
    "Karma / Hepsi":["Türkçe","Matematik","Fen","Fizik","Kimya","Biyoloji"]
  };
  let subjects=[...(POOLS[a.exam]||POOLS["TYT ağırlıklı"])];
  const weak=(a.weak||[]).map(s=>s==="Sosyal/Tarih"?"Sosyal":s);
  const strong=a.strong==="Sosyal/Tarih"?"Sosyal":a.strong;
  weak.forEach(w=>{if(!subjects.includes(w))subjects.push(w);});
  const bag=[];
  subjects.forEach(s=>{let w=weak.includes(s)?4:(s===strong?1:2);for(let k=0;k<w;k++)bag.push(s);});
  const dayCount=parseInt(a.days)||5;
  const DAYSETS={4:[0,2,4,5],5:[0,1,2,3,5],6:[0,1,2,3,4,5],7:[0,1,2,3,4,5,6]};
  const days=DAYSETS[dayCount]||DAYSETS[5];
  const wkdayMap={"1-2 saat":2,"2-3 saat":3,"3-4 saat":4,"4+ saat":5};
  const wkendMap={"2-3 saat":3,"3-5 saat":4,"5-7 saat":6,"7+ saat":8};
  let wkdayH=wkdayMap[a.wkday]||3, wkendH=wkendMap[a.wkend]||4;
  if(a.ramp==="Hızlı artsın"){wkdayH=Math.min(6,wkdayH+1);wkendH=Math.min(9,wkendH+1);}
  else if(a.ramp==="Yavaşça artsın"){wkendH=Math.min(9,wkendH+1);}
  const blockH=a.focus==="90 dk+"?2:1;
  const wkdayStart={"Kısa (30 dk)":16,"Orta (1 saat)":17,"Uzun (2 saat+)":18}[a.rest]||17;
  const peakStart={"Sabah":9,"Öğleden sonra":13,"Akşam":17,"Gece":20}[a.peak]||10;
  const colorOf={}; subjects.forEach((s,i)=>colorOf[s]=i%COLORS.length);
  let bagIdx=Math.floor(Math.random()*bag.length);
  const nextSubj=()=>bag[(bagIdx++)%bag.length];
  const styleTag={"Konu öğrenme":"Konu","Soru çözme":"Soru","Tekrar":"Tekrar","Dengeli":null}[a.style];
  const tagFor=i=>styleTag||["Konu","Soru","Tekrar"][i%3];
  const topicQ={};
  weak.forEach(s=>{const t=(a.topics&&a.topics[s])||[]; if(t.length) topicQ[s]={list:t,idx:0};});
  const labelFor=(s,i)=>{ if(topicQ[s]){const q=topicQ[s];const t=q.list[q.idx%q.list.length];q.idx++;return s+" - "+t;} const tg=tagFor(i); return s+(tg?" - "+tg:""); };
  let denemeLeft={"0":0,"1":1,"2":2,"3+":3}[a.deneme]; if(denemeLeft===undefined)denemeLeft=1;
  const weekendDays=days.filter(d=>d>=5);
  const denemeDays=weekendDays.length?weekendDays:days.slice(-2);
  const sched=[];
  days.forEach(d=>{
    const weekend=d>=5;
    let target=weekend?wkendH:wkdayH;
    let hour=weekend?peakStart:wkdayStart, placed=0, bi=0;
    if(denemeLeft>0 && denemeDays.includes(d)){
      const dur=Math.min(3,Math.max(2,Math.min(3,target)));
      if(hour+dur<=23){sched.push({day:d,time:pad(hour),subj:"Deneme + Analiz",dur,color:3});hour+=dur;placed+=dur;denemeLeft--;}
    }
    while(placed<target && hour+blockH<=23){
      const s=nextSubj();
      sched.push({day:d,time:pad(hour),subj:labelFor(s,bi),dur:blockH,color:colorOf[s]});
      hour+=blockH; placed+=blockH; bi++;
    }
  });
  const hadOld=me().schedule.length>0;
  me().schedule=sched; persist(); closeModal();
  const totalH=sched.reduce((x,s)=>x+s.dur,0);
  const weakBlocks=sched.filter(s=>weak.some(w=>s.subj.startsWith(w))).length;
  go("takvim");
  setTimeout(()=>summaryModal(totalH,days.length,weak,weakBlocks,a,hadOld),140);
}
function summaryModal(totalH,dayCount,weak,weakBlocks,a,hadOld){
  modal(`<h3>Programın hazır ✨</h3>
    <p class="muted" style="font-size:14px;margin-bottom:14px">AI koç, 15 yanıtına göre haftalık planını kurdu.${hadOld?" Önceki programının yerine yazıldı.":""}</p>
    <div class="grid" style="grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px">
      <div class="card" style="padding:13px"><div class="faint" style="font-size:11.5px">Haftalık toplam</div><div style="font-family:var(--display);font-size:22px;font-weight:700">${totalH} saat</div></div>
      <div class="card" style="padding:13px"><div class="faint" style="font-size:11.5px">Çalışma günü</div><div style="font-family:var(--display);font-size:22px;font-weight:700">${dayCount} gün</div></div>
    </div>
    <ul style="font-size:13.5px;color:var(--muted);line-height:1.85;margin:0 0 16px;padding-left:18px">
      <li>Zayıf derslerine (${weak.join(", ")||"—"}) daha çok blok ayrıldı (${weakBlocks} blok).</li>
      ${(()=>{const tc=Object.values(a.topics||{}).reduce((x,arr)=>x+arr.length,0);return tc?`<li>İşaretlediğin <b>${tc} eksik konu</b> programa öncelikli yerleştirildi.</li>`:"";})()}
      <li>En verimli zamanın (${a.peak}) önceliklendirildi.</li>
      <li>Yük, mevcut seviyenin biraz üzerine kuruldu — çalışma saatini kademeli artırmak için.</li>
      <li>Her hafta tekrar çalıştırıp "Hızlı artsın" seçerek hedefi yükseltebilirsin.</li>
    </ul>
    <button class="btn" onclick="closeModal()">Programı Gör</button>`);
}

const STUDIFY_AI_KEY="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";
const STUDIFY_AI_MODEL="nvidia/nemotron-3-nano-30b-a3b:free";
let kocMsgs=[],kocLoading=false;

async function callAI(messages){
  const res=await fetch("https://openrouter.ai/api/v1/chat/completions",{method:"POST",
    headers:{"Content-Type":"application/json","Authorization":"Bearer "+STUDIFY_AI_KEY,
      "HTTP-Referer":(typeof location!=="undefined"&&location.origin)||"https://studify.app","X-Title":"Studify"},
    body:JSON.stringify({model:STUDIFY_AI_MODEL,messages,max_tokens:600,temperature:0.6})});
  if(!res.ok){let t="";try{t=await res.text();}catch(e){}throw new Error(res.status+(t?" "+t.slice(0,120):""));}
  const data=await res.json();
  return (data.choices&&data.choices[0]&&data.choices[0].message&&data.choices[0].message.content)||"(boş yanıt)";
}
function buildSummary(){
  const all=sortedDenemeler(),log=slog();
  const nets=all.slice(-6).map(d=>fmtDate(d.date)+": "+denemeNet(d).toFixed(1)+" net ("+d.type+")").join(", ")||"henüz deneme yok";
  const last7=log.filter(e=>daysAgo(e.date)<=7).reduce((a,e)=>a+e.hours,0);
  const subj=studyBySubject();
  const subjStr=Object.keys(subj).map(k=>k+": "+subj[k].toFixed(1)+" sa").join(", ")||"çalışma kaydı yok";
  let weak="bilinmiyor";
  if(all.length){const last=all[all.length-1];const sorted=[...last.rows].sort((a,b)=>net(a.d,a.y)-net(b.d,b.y));weak=sorted.slice(0,2).map(r=>r.subj).join(", ");}
  return `Öğrenci verileri:\n- Son denemeler: ${nets}\n- Bu hafta çalışma: ${last7.toFixed(1)} saat\n- Derslere göre toplam çalışma: ${subjStr}\n- Son denemede en zayıf dersler: ${weak}`;
}
function mdLite(s){return esc(s).replace(/\*\*(.+?)\*\*/g,"<b>$1</b>").replace(/\n/g,"<br>");}
function kocRender(){
  if(!kocMsgs.length&&!kocLoading) return `<div class="muted" style="padding:28px 16px;text-align:center;font-size:13.5px">Yukarıdaki butona bas ya da bir soru yaz — Studify AI verilerine bakıp yanıtlasın.</div>`;
  let h=kocMsgs.map(m=>`<div class="bubble ${m.role==='user'?'me':'you'}" style="max-width:88%;margin:8px 10px">${m.role==='user'?esc(m.content):mdLite(m.content)}</div>`).join("");
  if(kocLoading) h+=`<div class="bubble you" style="margin:8px 10px">Studify AI düşünüyor…</div>`;
  return h;
}
function kocRefresh(){const el=document.getElementById("kocBody");if(el){el.innerHTML=kocRender();el.scrollTop=el.scrollHeight;}}
async function kocAsk(q){
  if(kocLoading)return;
  kocMsgs.push({role:"user",content:q});kocLoading=true;kocRefresh();
  try{
    const sys="Sen Studify adlı bir TYT/AYT çalışma koçusun. Türkçe, kısa, somut ve motive edici yanıt ver; mümkünse madde madde. Öğrencinin verilerine dayan. Sağlıksız/aşırı çalışmayı, uykusuzluğu ya da öğünleri atlamayı asla teşvik etme; dengeli çalışmayı öner. Tıbbi tavsiye verme.";
    const ans=await callAI([{role:"system",content:sys},{role:"user",content:buildSummary()+"\n\nSoru: "+q}]);
    kocMsgs.push({role:"assistant",content:ans});
  }catch(e){
    kocMsgs.push({role:"assistant",content:"Şu an bağlanılamadı ("+e.message+"). Not: uygulama önizlemesinde dış internet kapalı olabilir; Netlify'daki canlı sitede çalışır."});
  }
  kocLoading=false;kocRefresh();
}
function kocAdvice(){kocAsk("Verilerime bakarak 3-4 maddelik somut, kısa bir tavsiye ver. Bu hafta neye odaklanmalıyım?");}
function kocPlan(){kocAsk("Verilerime göre haftalık bir çalışma planı öner: hangi gün hangi derse ne kadar süre ayırayım?");}
function kocSend(){const i=document.getElementById("kocIn");if(!i)return;const v=i.value.trim();if(!v)return;i.value="";kocAsk(v);}
function kocView(){
  return `<div class="view">
    <h1 style="font-size:22px;margin-bottom:4px">AI Koç</h1>
    <p class="muted" style="margin-bottom:16px">Deneme ve çalışma verilerine göre sana özel tavsiyeler — Studify AI.</p>
    <div style="display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap">

    <div class="card" id="kocBody" style="padding:6px 2px;max-height:52vh;overflow-y:auto">${kocRender()}</div>

      <input id="kocIn" placeholder="Koça bir şey sor..." style="flex:1;border:none;outline:none;font-size:14px;background:transparent" onkeydown="if(event.key==='Enter')kocSend()">
      <button class="send" onclick="kocSend()" style="width:38px;height:38px"><svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4z"/></svg></button>
    </div>
    <p class="faint" style="font-size:11px;margin-top:8px">Studify AI önerileri yol göstericidir; kesin sonuç vaat etmez.</p>
  </div>`;
}
